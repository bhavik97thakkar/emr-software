[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_API_URL = "https://emr-aarti-backend.onrender.com/api" }

[context.deploy-preview]
  environment = { VITE_API_URL = "https://emr-aarti-backend.onrender.com/api" }

[context.branch-deploy]
  environment = { VITE_API_URL = "https://emr-aarti-backend.onrender.com/api" }
