server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Reverse Proxy ─────────────────────────────────────
    # All /api/* requests go to the backend container
    location /api/ {
        proxy_pass         http://medcore-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Increase limits for file uploads (Base64 reports)
        client_max_body_size 100m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # ── React SPA Fallback ────────────────────────────────────
    # For all other routes, serve index.html
    # This is required for React Router (HashRouter handles # routes,
    # but this is a safety net for direct URL access)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
